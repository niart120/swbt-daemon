name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-and-package:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    env:
      SWBT_RUN_HARDWARE: "0"
      SWBT_HARDWARE_APPROVED: "0"
      SWBT_CTEST_PARALLEL_LEVEL: "8"
      CCACHE_DIR: /workspaces/swbt-daemon/.ccache
      CCACHE_MAXSIZE: "500M"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-release-ccache-${{ hashFiles('.devcontainer/Dockerfile', 'CMakeLists.txt', 'CMakePresets.json', 'cmake/**/*.cmake', 'justfile', 'scripts/**', 'api/**', 'apps/**', 'swbt/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-release-ccache-
            ${{ runner.os }}-ccache-
      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Verify and package in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}/swbt-daemon-devcontainer
          cacheFrom: ghcr.io/${{ github.repository }}/swbt-daemon-devcontainer
          push: filter
          refFilterForPush: refs/heads/main
          eventFilterForPush: push
          env: |
            SWBT_CTEST_PARALLEL_LEVEL=${{ env.SWBT_CTEST_PARALLEL_LEVEL }}
            CCACHE_DIR=${{ env.CCACHE_DIR }}
            CCACHE_MAXSIZE=${{ env.CCACHE_MAXSIZE }}
          runCmd: |
            just verify-ci
            just package-windows-release
      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-package
          path: |
            dist/swbt-daemon-v*-windows-x86_64.zip
            dist/swbt-daemon-v*-windows-x86_64.zip.sha256
          if-no-files-found: error
          retention-days: 14

  smoke-windows:
    runs-on: windows-2022
    needs: verify-and-package
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Download release package artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-package
          path: dist
      - name: Verify checksum and run package smoke
        shell: pwsh
        run: |
          $zips = @(Get-ChildItem -LiteralPath dist -Filter 'swbt-daemon-v*-windows-x86_64.zip')
          if ($zips.Count -ne 1) {
              throw "Expected one release zip, found $($zips.Count)"
          }

          $zip = $zips[0]
          $shaPath = "$($zip.FullName).sha256"
          if (-not (Test-Path -LiteralPath $shaPath)) {
              throw "Missing checksum file: $shaPath"
          }

          $expected = (Get-Content -LiteralPath $shaPath -TotalCount 1).Split(" ", [System.StringSplitOptions]::RemoveEmptyEntries)[0].ToLowerInvariant()
          $actual = (Get-FileHash -LiteralPath $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
              throw "Checksum mismatch for $($zip.Name): expected $expected, got $actual"
          }

          $extractDir = Join-Path $PWD "dist\smoke"
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $extractDir -Force

          $packages = @(Get-ChildItem -LiteralPath $extractDir -Directory -Filter 'swbt-daemon-v*-windows-x86_64')
          if ($packages.Count -ne 1) {
              throw "Expected one extracted package directory, found $($packages.Count)"
          }

          .\scripts\smoke-windows-release.ps1 -PackageDir $packages[0].FullName

  draft-release:
    runs-on: ubuntu-24.04
    needs:
      - verify-and-package
      - smoke-windows
    permissions:
      contents: write
    steps:
      - name: Download release package artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-package
          path: dist
      - name: Create or update draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          shopt -s nullglob
          assets=(dist/swbt-daemon-v*-windows-x86_64.zip dist/swbt-daemon-v*-windows-x86_64.zip.sha256)
          if [ "${#assets[@]}" -ne 2 ]; then
              printf '%s\n' "Expected release zip and checksum, found ${#assets[@]} files" >&2
              exit 1
          fi

          notes=$(cat <<'NOTES'
          Draft release generated by GitHub Actions.

          Publish only after M6 release candidate validation records:
          - just verify
          - release package smoke
          - license / notice check
          - hardware state or explicit non-execution reason
          NOTES
          )

          if is_draft=$(gh release view "$tag" --json isDraft --jq .isDraft 2>/dev/null); then
              if [ "$is_draft" != "true" ]; then
                  printf '%s\n' "Release $tag already exists and is not a draft; refusing to overwrite assets" >&2
                  exit 1
              fi
              gh release upload "$tag" "${assets[@]}" --clobber
          else
              gh release create "$tag" "${assets[@]}" --draft --verify-tag --title "$tag" --notes "$notes"
          fi
